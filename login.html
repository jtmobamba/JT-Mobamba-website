<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JT Mobamba</title>
    <link rel="icon" type="image/svg+xml" href="logo (1).svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #FFF8F0;
            min-height: 100vh;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
        }
        .brand-logo {
            width: 64px;
            height: 64px;
            background: #E8C5B0;
            border-radius: 16px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-logo svg {
            width: 36px;
            height: 36px;
            color: #C4815D;
        }
        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A1A1A;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .brand-subtitle {
            font-size: 0.875rem;
            color: #6B6B6B;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1A1A1A;
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            width: 20px;
            height: 20px;
        }
        .form-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            font-size: 0.875rem;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            background: #FFFFFF;
            color: #1A1A1A;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #C4815D;
            box-shadow: 0 0 0 3px rgba(196, 129, 93, 0.1);
        }
        .form-input::placeholder {
            color: #9CA3AF;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        .password-toggle:hover {
            color: #6B6B6B;
        }
        .btn-primary {
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #FFFFFF;
            background: #C4815D;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            background: #A66B4A;
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-links a {
            color: #C4815D;
            font-size: 0.875rem;
            text-decoration: none;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        .auth-divider {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E5E5E5;
            text-align: center;
        }
        .auth-divider p {
            font-size: 0.875rem;
            color: #6B6B6B;
        }
        .auth-divider a {
            color: #C4815D;
            font-weight: 500;
            text-decoration: none;
        }
        .auth-divider a:hover {
            text-decoration: underline;
        }
        .form-error {
            color: #EF4444;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .clear-session {
            margin-top: 1.5rem;
            text-align: center;
        }
        .clear-session a {
            color: #9CA3AF;
            font-size: 0.75rem;
            text-decoration: none;
        }
        .clear-session a:hover {
            color: #6B6B6B;
        }
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #FFFFFF;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1A1A1A;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            color: #9CA3AF;
            background: none;
            border: none;
            transition: all 0.2s ease;
        }
        .modal-close:hover {
            background: #F5F4F1;
            color: #1A1A1A;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo and Brand -->
            <div class="brand-logo">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
                </svg>
            </div>
            <h1 class="brand-title">JT Mobamba</h1>
            <p class="brand-subtitle">Welcome back</p>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="toggle-password">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">Sign In</button>

                <div id="login-error" class="form-error" style="display: none;"></div>
            </form>

            <!-- Auth Links -->
            <div class="auth-links">
                <a href="#" id="signup-link">Don't have an account? <strong>Sign Up</strong></a>
            </div>
            <div class="auth-links">
                <a href="#" id="forgot-password-link">Forgot Password?</a>
            </div>

            <!-- Clear Session -->
            <div class="clear-session">
                <a href="#" id="clear-session-link">Having trouble? Clear session data</a>
            </div>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div class="modal-overlay" id="signup-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Create an account</h3>
                <button class="modal-close" id="close-signup">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label" for="signup-name">Full name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <input type="password" id="signup-password" class="form-input" placeholder="Create a strong password" required minlength="8">
                    </div>
                    <p style="font-size: 0.75rem; color: #9CA3AF; margin-top: 0.375rem;">At least 8 characters</p>
                </div>

                <button type="submit" class="btn-primary" id="signup-btn">Create account</button>

                <div id="signup-error" class="form-error" style="display: none;"></div>
                <div id="signup-success" style="color: #10B981; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; display: none;"></div>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgot-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Reset your password</h3>
                <button class="modal-close" id="close-forgot">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <p style="color: #6B6B6B; font-size: 0.875rem; margin-bottom: 1rem;">Enter your email address and we'll send you a link to reset your password.</p>

            <form id="forgot-form">
                <div class="form-group">
                    <label class="form-label" for="forgot-email">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <input type="email" id="forgot-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="forgot-btn">Send reset link</button>

                <div id="forgot-error" class="form-error" style="display: none;"></div>
                <div id="forgot-success" style="color: #10B981; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; display: none;"></div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        // API URL is automatically detected by api.js

        // Password toggle
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('svg');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            } else {
                passwordInput.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            }
        });

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorDiv.style.display = 'none';

            try {
                const data = await api.login(email, password);
                localStorage.setItem('jt_user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'Login failed. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        // Signup modal
        document.getElementById('signup-link').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('signup-modal').classList.add('active');
        });

        document.getElementById('close-signup').addEventListener('click', function() {
            document.getElementById('signup-modal').classList.remove('active');
        });

        // Signup form handler
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorDiv = document.getElementById('signup-error');
            const successDiv = document.getElementById('signup-success');
            const btn = document.getElementById('signup-btn');

            const nameParts = name.trim().split(' ');
            const firstName = nameParts[0];
            const lastName = nameParts.slice(1).join(' ') || firstName;

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const data = await api.register({ email, password, firstName, lastName });
                localStorage.setItem('jt_user', JSON.stringify(data.user));
                successDiv.textContent = 'Account created! Redirecting...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                errorDiv.textContent = error.message || 'Registration failed. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create account';
            }
        });

        // Forgot password modal
        document.getElementById('forgot-password-link').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('forgot-modal').classList.add('active');
        });

        document.getElementById('close-forgot').addEventListener('click', function() {
            document.getElementById('forgot-modal').classList.remove('active');
        });

        // Forgot password form
        document.getElementById('forgot-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const successDiv = document.getElementById('forgot-success');
            successDiv.textContent = 'If an account exists with that email, you will receive a password reset link.';
            successDiv.style.display = 'block';
        });

        // Clear session link
        document.getElementById('clear-session-link').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.clear();
            sessionStorage.clear();
            alert('Session data cleared. Please try logging in again.');
            window.location.reload();
        });

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
